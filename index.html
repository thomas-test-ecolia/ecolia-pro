<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ecolia Pro — Espace élève</title>
<meta name="description" content="Ecolia Pro — Lance et développe ton business de nettoyage auto">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ecolia Pro">
<meta name="mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#B5D4F4;--blue-dark:#0C447C;
  --green-light:#EAF3DE;--green-dark:#27500A;--green-mid:#3B6D11;
  --amber-light:#FAEEDA;--amber-dark:#633806;
  --red-light:#FCEBEB;--red-dark:#791F1F;--red-mid:#A32D2D;
  --gray-bg:#F7F7F5;--gray-border:rgba(0,0,0,0.1);--gray-border-mid:rgba(0,0,0,0.18);
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-tertiary:#aaa;
  --bg-primary:#ffffff;--bg-secondary:#f5f5f3;--bg-tertiary:#efefec;
  --radius-md:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--gray-bg);min-height:100vh;color:var(--text-primary);font-size:14px}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;background:var(--gray-bg)}
.login-left{flex:1;background:var(--blue);display:flex;flex-direction:column;justify-content:center;padding:3rem;min-height:100vh}
.login-left-logo{display:flex;align-items:center;gap:12px;margin-bottom:3rem}
.login-left-icon{width:48px;height:48px;background:rgba(255,255,255,0.15);border-radius:14px;display:flex;align-items:center;justify-content:center}
.login-left-name{font-size:22px;font-weight:700;color:white}
.login-left-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px}
.login-left-title{font-size:30px;font-weight:700;color:white;line-height:1.25;margin-bottom:1rem;max-width:340px}
.login-left-desc{font-size:14px;color:rgba(255,255,255,0.75);line-height:1.7;max-width:340px;margin-bottom:2.5rem}
.login-features{display:flex;flex-direction:column;gap:12px}
.login-feat{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.9);font-size:13px}
.login-feat-icon{width:28px;height:28px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.login-right{width:480px;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg-primary)}
.login-box{width:100%;max-width:380px}
.login-tabs{display:flex;margin-bottom:2rem;border-bottom:0.5px solid var(--gray-border)}
.login-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px}
.login-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.login-section-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-section-sub{font-size:13px;color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.5}
.login-field{margin-bottom:12px}
.login-field label{font-size:11px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em}
.login-field input{width:100%;padding:10px 12px;font-size:13px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);outline:none;transition:border-color 0.15s}
.login-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,0.08)}
.login-field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.login-btn{width:100%;padding:11px;background:var(--blue);color:white;border:none;border-radius:var(--radius-md);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:0.75rem;transition:background 0.12s}
.login-btn:hover{background:var(--blue-dark)}
.login-btn:disabled{opacity:0.6;cursor:not-allowed}
.login-error{background:var(--red-light);color:var(--red-dark);font-size:12px;padding:9px 12px;border-radius:var(--radius-md);margin-top:12px;display:none}
.login-error.show{display:block}
.login-success{background:var(--green-light);color:var(--green-dark);font-size:12px;padding:9px 12px;border-radius:var(--radius-md);margin-top:12px;display:none}
.login-success.show{display:block}
.login-hint{font-size:11px;color:var(--text-tertiary);text-align:center;margin-top:1rem;line-height:1.6}
.pw-strength{height:3px;border-radius:2px;margin-top:6px;background:var(--bg-tertiary);overflow:hidden}
.pw-strength-bar{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s}

/* ── LOADING ── */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:var(--gray-bg)}
.spinner{width:36px;height:36px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── APP ── */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--bg-primary);border-right:0.5px solid var(--gray-border);display:flex;flex-direction:column;min-height:100vh;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.logo{padding:1.25rem 1.25rem 1rem;border-bottom:0.5px solid var(--gray-border)}
.logo-icon{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.logo-name{font-size:15px;font-weight:600}
.logo-sub{font-size:11px;color:var(--text-secondary);margin-top:2px}
.logo-user{font-size:11px;color:var(--blue);font-weight:500;margin-top:3px}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);padding:1rem 1.25rem 0.25rem}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 1.25rem;font-size:13px;cursor:pointer;color:var(--text-secondary);transition:background 0.12s;user-select:none}
.nav-item:hover{background:var(--bg-secondary)}
.nav-item.active{color:var(--blue);background:var(--blue-light);font-weight:500}
.nav-icon{width:15px;height:15px;flex-shrink:0;opacity:0.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:var(--blue-light);color:var(--blue);font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.nav-badge.green{background:var(--green-light);color:var(--green-mid)}
.sidebar-footer{margin-top:auto;padding:1rem 1.25rem;border-top:0.5px solid var(--gray-border)}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);cursor:pointer;padding:6px 0}
.logout-btn:hover{color:var(--red-mid)}
.main{margin-left:220px;flex:1;padding:1.5rem;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.page-title{font-size:18px;font-weight:600}
.btn-group{display:flex;gap:8px}
.btn{padding:7px 16px;font-size:13px;border-radius:var(--radius-md);cursor:pointer;font-weight:500;border:0.5px solid var(--gray-border-mid);background:var(--bg-primary);color:var(--text-primary);transition:background 0.12s;font-family:var(--font)}
.btn:hover{background:var(--bg-secondary)}
.btn.primary{background:var(--blue);color:white;border-color:var(--blue)}
.btn.primary:hover{background:var(--blue-dark)}
.btn.sm{padding:4px 10px;font-size:11px}
.stats-grid{display:grid;gap:12px;margin-bottom:1.25rem}
.cols4{grid-template-columns:repeat(4,1fr)}
.cols3{grid-template-columns:repeat(3,1fr)}
.cols2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--bg-primary);border:0.5px solid var(--gray-border);border-radius:var(--radius-md);padding:1rem 1.1rem}
.stat-label{font-size:11px;color:var(--text-secondary);margin-bottom:5px}
.stat-value{font-size:24px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--green-mid);margin-top:4px}
.stat-sub.red{color:var(--red-mid)}
.card{background:var(--bg-primary);border:0.5px solid var(--gray-border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.1rem;border-bottom:0.5px solid var(--gray-border)}
.card-title{font-size:13px;font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.tbl-wrap{overflow-x:auto;width:100%}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 12px;text-align:left;font-size:11px;font-weight:500;color:var(--text-secondary);border-bottom:0.5px solid var(--gray-border);background:var(--bg-secondary);white-space:nowrap}
tbody td{padding:8px 12px;border-bottom:0.5px solid var(--gray-border);color:var(--text-primary);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg-secondary)}
.td-right{text-align:right}
.td-num{text-align:right;font-variant-numeric:tabular-nums}
.pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500}
.pill-blue{background:var(--blue-light);color:var(--blue-dark)}
.pill-green{background:var(--green-light);color:var(--green-dark)}
.pill-amber{background:var(--amber-light);color:var(--amber-dark)}
.pill-red{background:var(--red-light);color:var(--red-dark)}
.progress-row{display:flex;align-items:center;gap:12px;padding:9px 1.1rem;border-bottom:0.5px solid var(--gray-border);font-size:12px}
.progress-row:last-child{border-bottom:none}
.prog-label{flex:1}
.prog-bar-wrap{width:90px;height:5px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
.prog-bar{height:100%;border-radius:3px;background:var(--blue)}
.prog-pct{width:32px;text-align:right;font-size:11px;color:var(--text-secondary)}
.cal-layout{display:grid;grid-template-columns:1fr 280px;gap:12px}
.day-names-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:0.5px solid var(--gray-border)}
.day-name-cell{padding:7px 0;text-align:center;font-size:11px;color:var(--text-secondary);font-weight:500}
.days-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.day-cell{min-height:70px;border-right:0.5px solid var(--gray-border);border-bottom:0.5px solid var(--gray-border);padding:4px;cursor:pointer;transition:background 0.1s}
.day-cell:hover{background:var(--bg-secondary)}
.day-cell:nth-child(7n){border-right:none}
.day-cell.selected{background:var(--blue-light)}
.day-num{font-size:11px;color:var(--text-secondary);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.day-num.today{background:var(--blue);color:white;font-weight:600}
.day-num.other-month{color:var(--text-tertiary)}
.ev-chip{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-chip.nettoyage{background:var(--blue-light);color:var(--blue-dark)}
.ev-chip.visite{background:var(--green-light);color:var(--green-dark)}
.ev-chip.coaching{background:var(--amber-light);color:var(--amber-dark)}
.cal-legend{display:flex;gap:12px;padding:0.65rem 1.1rem;border-top:0.5px solid var(--gray-border)}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.side-panel{background:var(--bg-primary);border:0.5px solid var(--gray-border);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;max-height:600px}
.side-panel-head{padding:0.9rem 1.1rem;border-bottom:0.5px solid var(--gray-border)}
.side-panel-title{font-size:13px;font-weight:600}
.side-panel-sub{font-size:11px;color:var(--text-secondary);margin-top:2px}
.side-panel-body{flex:1;overflow-y:auto;padding:0.6rem}
.rdv-item{border:0.5px solid var(--gray-border);border-radius:var(--radius-md);padding:9px 11px;margin-bottom:6px}
.rdv-time{font-size:10px;color:var(--text-secondary);margin-bottom:2px}
.rdv-name{font-size:12px;font-weight:500}
.rdv-del{float:right;font-size:13px;color:var(--text-tertiary);cursor:pointer;margin-top:-16px}
.rdv-del:hover{color:var(--red-mid)}
.add-rdv-btn{margin:0.6rem;padding:8px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);background:none;cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:var(--font);text-align:center;width:calc(100% - 1.2rem)}
.add-rdv-btn:hover{background:var(--bg-secondary)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--gray-border);padding:1.5rem;width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1.1rem}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--text-secondary);display:block;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:70px}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:10px;margin-top:1.25rem}
.btn-cancel{flex:1;padding:8px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);background:none;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:var(--font)}
.btn-save{flex:2;padding:8px;border:none;border-radius:var(--radius-md);background:var(--blue);color:white;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font)}
.btn-save:hover{background:var(--blue-dark)}
.crm-bar{display:flex;gap:10px;padding:0.8rem 1.1rem;border-bottom:0.5px solid var(--gray-border);align-items:center}
.crm-search{flex:1;padding:7px 10px;font-size:13px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-family:var(--font);outline:none}
.evo-up{color:var(--green-mid);font-weight:500}
.evo-down{color:var(--red-mid);font-weight:500}
.evo-neu{color:var(--text-tertiary)}
.del-btn{cursor:pointer;color:var(--text-tertiary);font-size:14px}
.del-btn:hover{color:var(--red-mid)}
.empty{padding:2rem;text-align:center;font-size:13px;color:var(--text-tertiary)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:0.85rem 1.1rem;border-bottom:0.5px solid var(--gray-border)}
.cal-nav-title{font-size:14px;font-weight:600}
.cal-nav-btn{background:none;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);padding:4px 10px;cursor:pointer;font-size:14px;color:var(--text-primary)}
.modules-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.module-card{background:var(--bg-primary);border:0.5px solid var(--gray-border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow 0.15s}
.module-card:hover{box-shadow:0 2px 16px rgba(0,0,0,0.1)}
.module-card-head{padding:1.1rem;border-bottom:0.5px solid var(--gray-border)}
.module-num{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--blue);margin-bottom:4px}
.module-title{font-size:14px;font-weight:600;margin-bottom:5px}
.module-desc-short{font-size:12px;color:var(--text-secondary);line-height:1.5}
.module-card-foot{display:flex;align-items:center;padding:0.75rem 1.1rem;gap:10px}
.module-prog-wrap{flex:1;height:4px;background:var(--bg-tertiary);border-radius:2px}
.module-prog-bar{height:100%;border-radius:2px;background:var(--blue)}
.module-prog-pct{font-size:11px;color:var(--text-secondary);min-width:28px;text-align:right}
.mod-back{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;cursor:pointer;color:var(--text-secondary);font-size:13px;width:fit-content}
.mod-back:hover{color:var(--blue)}
.mod-header{margin-bottom:1.25rem}
.mod-header-title{font-size:20px;font-weight:700;margin-bottom:4px}
.mod-header-sub{font-size:13px;color:var(--text-secondary);line-height:1.5}
.mod-tabs{display:flex;margin-bottom:1.25rem;border-bottom:0.5px solid var(--gray-border);overflow-x:auto}
.mod-tab{padding:9px 18px;font-size:13px;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;white-space:nowrap}
.mod-tab:hover{color:var(--text-primary)}
.mod-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1rem}
.video-card{background:var(--bg-primary);border:0.5px solid var(--gray-border);border-radius:var(--radius-lg);overflow:hidden}
.video-thumb{background:#000;aspect-ratio:16/9}
.video-thumb iframe{width:100%;height:100%;border:none;display:block}
.video-info{padding:0.75rem 0.9rem}
.video-title{font-size:13px;font-weight:500;margin-bottom:3px}
.video-dur{font-size:11px;color:var(--text-secondary)}
.keypoints{padding:0.25rem 0}
.keypoint{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--gray-border)}
.keypoint:last-child{border-bottom:none}
.kp-dot{width:20px;height:20px;background:var(--blue-light);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.kp-text{font-size:13px;line-height:1.55}
.pdf-list{padding:0.5rem 0}
.pdf-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border:0.5px solid var(--gray-border);border-radius:var(--radius-md);margin-bottom:8px;cursor:pointer}
.pdf-item:hover{background:var(--bg-secondary)}
.pdf-icon{width:36px;height:36px;background:var(--red-light);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pdf-name{flex:1;font-size:13px;font-weight:500}
.pdf-size{font-size:11px;color:var(--text-secondary)}
.quiz-question{margin-bottom:1.5rem}
.quiz-q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid var(--gray-border);border-radius:var(--radius-md);cursor:pointer;font-size:13px}
.quiz-option:hover{background:var(--bg-secondary)}
.quiz-option.selected{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}
.quiz-option.correct{border-color:var(--green-mid);background:var(--green-light);color:var(--green-dark)}
.quiz-option.wrong{border-color:var(--red-mid);background:var(--red-light);color:var(--red-dark)}
.quiz-radio{width:16px;height:16px;border:1.5px solid var(--gray-border-mid);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.quiz-radio.on{border-color:var(--blue);background:var(--blue)}
.quiz-radio.on::after{content:'';width:6px;height:6px;background:white;border-radius:50%}
.quiz-result{padding:1rem;border-radius:var(--radius-md);margin-top:1rem;font-size:15px;font-weight:600;text-align:center}
.quiz-result.good{background:var(--green-light);color:var(--green-dark)}
.quiz-result.bad{background:var(--red-light);color:var(--red-dark)}

/* MOBILE */
.mobile-nav{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:299}
.sidebar-overlay.show{display:block}
@media(max-width:768px){
  .login-left{display:none}
  .login-right{width:100%;padding:1.5rem}
  .sidebar{transform:translateX(-100%);transition:transform 0.25s ease;z-index:300}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:1rem;padding-bottom:80px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg-primary);border-top:0.5px solid var(--gray-border);z-index:200;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}

const GOOGLE_CLIENT_ID = '989372663835-v37r4hgv7be9ncib82q0drlamish2gf1.apps.googleusercontent.com';
const GOOGLE_SCOPES = 'https://www.googleapis.com/auth/calendar.events';
let googleAccessToken = null;
let googleConnected = false;
let gapiReady = false;

function initGoogleAPI(){
  return new Promise((resolve) => {
    function tryInit(){
      if(typeof gapi === 'undefined'){ setTimeout(tryInit, 500); return; }
      gapi.load('client', async () => {
        try {
          await gapi.client.init({
            discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest']
          });
          gapiReady = true;
          resolve(true);
        } catch(e){ console.error('gapi init error:', e); resolve(false); }
      });
    }
    tryInit();
  });
}

function connectGoogleCalendar(){
  if(typeof google === 'undefined' || !google.accounts){
    alert('Chargement en cours, réessaie dans quelques secondes.');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: async (resp) => {
      if(resp.error){ console.error(resp); return; }
      googleAccessToken = resp.access_token;
      googleConnected = true;
      if(gapiReady) gapi.client.setToken({access_token: googleAccessToken});
      render();
      const n = await syncFromGoogle();
      alert((n||0) + ' RDV importé(s) depuis Google Agenda !');
    }
  });
  client.requestAccessToken();
}

function disconnectGoogleCalendar(){
  if(googleAccessToken) google.accounts.oauth2.revoke(googleAccessToken, ()=>{});
  googleAccessToken = null;
  googleConnected = false;
  render();
}

async function syncFromGoogle(){
  if(!googleConnected || !gapiReady) return 0;
  try {
    const now = new Date();
    const timeMin = new Date(now.getFullYear()-1, 0, 1).toISOString();
    const timeMax = new Date(now.getFullYear()+1, 11, 31).toISOString();
    let allItems = [];
    let pageToken = null;
    do {
      const params = {
        calendarId: 'primary', timeMin, timeMax,
        singleEvents: true, orderBy: 'startTime', maxResults: 250
      };
      if(pageToken) params.pageToken = pageToken;
      const resp = await gapi.client.calendar.events.list(params);
      allItems = allItems.concat(resp.result.items || []);
      pageToken = resp.result.nextPageToken;
    } while(pageToken);

    let imported = 0;
    for(const item of allItems){
      // Accepte les RDV avec heure ET les événements toute la journée
      const hasTime = item.start?.dateTime;
      const isAllDay = item.start?.date && !item.start?.dateTime;
      if(!hasTime && !isAllDay) continue;

      let d, m, y, time;
      if(hasTime){
        const start = new Date(item.start.dateTime);
        d=start.getDate(); m=start.getMonth(); y=start.getFullYear();
        time=`${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
      } else {
        const parts = item.start.date.split('-');
        y=parseInt(parts[0]); m=parseInt(parts[1])-1; d=parseInt(parts[2]);
        time='08:00';
      }

      const exists = D.events.find(e=>e.day===d&&e.month===m&&e.year===y&&e.time===time&&e.name===item.summary);
      if(!exists){
        const row={user_id:currentUser.id,day:d,month:m,year:y,name:item.summary||'RDV Google',time,type:'nettoyage',vehicle:''};
        const{data}=await sb.from('events').insert(row).select().single();
        if(data){D.events.push(data);imported++;}
      }
    }
    return imported;
  } catch(e){ console.error('Sync error:',e); return 0; }
}

async function syncGoogleAndRefresh(){
  const n = await syncFromGoogle();

  render();
  alert((n||0) + ' nouveau(x) RDV importé(s) de Google Agenda');
}

async function exportAllToGoogle(){
  if(!googleConnected || !gapiReady){ alert('Connecte Google Agenda en premier.'); return; }
  let exported = 0;
  for(const e of D.events){
    try {
      const pad = n => String(n).padStart(2,'0');
      const [h,m2] = (e.time||'09:00').split(':');
      const start = `${e.year}-${pad(e.month+1)}-${pad(e.day)}T${pad(h)}:${pad(m2)}:00`;
      const endH = String(parseInt(h)+1).padStart(2,'0');
      const end = `${e.year}-${pad(e.month+1)}-${pad(e.day)}T${endH}:${pad(m2)}:00`;
      await gapi.client.calendar.events.insert({
        calendarId: 'primary',
        resource: {
          summary: `${e.name} — ${EV_LABELS[e.type]||e.type}`,
          description: e.vehicle ? `Vehicule : ${e.vehicle}` : '',
          start: {dateTime: start, timeZone: 'Europe/Paris'},
          end: {dateTime: end, timeZone: 'Europe/Paris'}
        }
      });
      exported++;
    } catch(err){ console.error(err); }
  }
  alert(exported + ' RDV exportes vers Google Agenda !');
}

async function toggleAccess(userId, newStatut, message){
  const existing = (window.adminData.subs||[]).find(s=>s.user_id===userId);
  if(existing){
    await sb.from('abonnements').update({statut:newStatut,message:message||''}).eq('user_id',userId);
    existing.statut=newStatut; existing.message=message||'';
  } else {
    const{data}=await sb.from('abonnements').insert({user_id:userId,statut:newStatut,message:message||''}).select().single();
    if(data) window.adminData.subs.push(data);
  }
  renderAdmin();
}

function promptSuspend(userId){
  const msg = prompt('Message pour eleve (optionnel) :', 'Acces suspendu. Contacte Thomas pour regulariser.');
  if(msg===null) return; // cancelled
  toggleAccess(userId, 'suspendu', msg);
}

async function updateExpiry(userId, date){
  const existing = (window.adminData.subs||[]).find(s=>s.user_id===userId);
  if(existing){
    await sb.from('abonnements').update({date_expiration:date}).eq('user_id',userId);
    existing.date_expiration=date;
  } else {
    const{data}=await sb.from('abonnements').insert({user_id:userId,statut:'actif',date_expiration:date}).select().single();
    if(data) window.adminData.subs.push(data);
  }
}

async function addEleve(){

  await updateExpiry(p.id, expiry||'');
  alert('Eleve ajoute !');

function checkPwStrength(pw){
  const bar=$('pw-bar');if(!bar)return;
  let s=0;
  if(pw.length>=6)s++;if(pw.length>=10)s++;
  if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^a-zA-Z0-9]/.test(pw))s++;
  bar.style.width=(s*20)+'%';
  bar.style.background=['','#E24B4A','#EF9F27','#EF9F27','#3B6D11','#3B6D11'][s]||'#E24B4A';
}

async function doLogin(){
  const email=$('login-email').value.trim();
  const pw=$('login-pw').value;
  const btn=$('login-submit-btn');
  const err=$('login-error');
  err.classList.remove('show');
  if(!email||!pw){err.textContent='Email et mot de passe requis.';err.classList.add('show');return;}
  btn.disabled=true;btn.textContent='Connexion...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent='Email ou mot de passe incorrect.';err.classList.add('show');btn.disabled=false;btn.textContent='Se connecter';return;}
  currentUser=data.user;
  await loadProfileAndStart();
}

async function doRegister(){
  const prenom=$('reg-prenom').value.trim();
  const nom=$('reg-nom').value.trim();
  const age=parseInt($('reg-age').value);
  const identifiant=$('reg-id').value.trim().toLowerCase().replace(/\s+/g,'');
  const email=$('reg-email').value.trim();
  const pw=$('reg-pw').value;
  const pw2=$('reg-pw2').value;
  const btn=$('reg-submit-btn');
  const err=$('reg-error');
  const suc=$('reg-success');
  err.classList.remove('show');suc.classList.remove('show');

  if(!prenom||!nom){err.textContent='Prénom et nom requis.';err.classList.add('show');return;}
  if(!age||age<16){err.textContent='Âge invalide (minimum 16 ans).';err.classList.add('show');return;}
  if(!identifiant||identifiant.length<3){err.textContent='Identifiant trop court (min. 3 caractères).';err.classList.add('show');return;}
  if(!email||!email.includes('@')){err.textContent='Email invalide.';err.classList.add('show');return;}
  if(pw.length<6){err.textContent='Mot de passe trop court (min. 6 caractères).';err.classList.add('show');return;}
  if(pw!==pw2){err.textContent='Les mots de passe ne correspondent pas.';err.classList.add('show');return;}

  btn.disabled=true;btn.textContent='Création du compte...';

  // Vérifier si identifiant déjà pris
  const {data:existing}=await sb.from('profiles').select('id').eq('identifiant',identifiant).maybeSingle();
  if(existing){err.textContent='Cet identifiant est déjà utilisé.';err.classList.add('show');btn.disabled=false;btn.textContent='Créer mon compte';return;}

  // Créer le compte Supabase Auth
  const {data,error}=await sb.auth.signUp({email,password:pw});
  if(error){err.textContent=error.message==='User already registered'?'Un compte existe déjà avec cet email.':error.message;err.classList.add('show');btn.disabled=false;btn.textContent='Créer mon compte';return;}

  // Créer le profil
  await sb.from('profiles').insert({id:data.user.id,identifiant,prenom,nom,age,role:'eleve'});

  suc.textContent='Compte créé avec succès ! Tu peux maintenant te connecter.';
  suc.classList.add('show');
  btn.disabled=false;btn.textContent='Créer mon compte';
  setTimeout(()=>switchTab('login'),2500);
}

const ADMIN_EMAIL = 'contact.ecolia76@gmail.com';

async function loadProfileAndStart(){
  showLoading('Chargement de ton espace...');
  const {data:profile}=await sb.from('profiles').select('*').eq('id',currentUser.id).maybeSingle();
  currentProfile=profile;

  // Check if admin
  if(currentUser.email === ADMIN_EMAIL){
    await loadAdminData(); // renderAdmin is called inside loadAdminData
    return;
  }

  // Check subscription status
  const {data:sub}=await sb.from('abonnements').select('*').eq('user_id',currentUser.id).maybeSingle();
  if(sub && sub.statut==='suspendu'){
    renderSuspended(sub.message);
    return;
  }

  await loadAllData();
  renderApp();
}

// CA vient du champ 'ca' de la fiche client (saisi manuellement)
function getClientCA(clientName){
  // Somme de toutes les interventions du client
  return D.interventions.filter(i=>i.client_name===clientName).reduce((s,i)=>s+(i.montant||0),0);
}
function getTotalCA(){
  return D.interventions.reduce((s,i)=>s+(i.montant||0),0);
}
function getMonthCA(year, month){
  // Si year/month fournis, calcule pour ce mois spécifique
  // Sinon utilise le mois courant
  const y = year !== undefined ? year : new Date().getFullYear();
  const m = month !== undefined ? month : new Date().getMonth();
  const prefix = y+'-'+String(m+1).padStart(2,'0');
  return D.interventions.filter(i=>i.date&&i.date.startsWith(prefix)).reduce((s,i)=>s+(i.montant||0),0);
}
function getWeekCA(){
  const now=new Date();
  const dayOfWeek=now.getDay()===0?6:now.getDay()-1;
  const weekStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dayOfWeek);
  const weekEnd=new Date(weekStart.getTime()+7*24*60*60*1000);
  return D.interventions.filter(i=>{
    if(!i.date) return false;
    const d=new Date(i.date);
    return d>=weekStart&&d<weekEnd;
  }).reduce((s,i)=>s+(i.montant||0),0);
}
function getWeekClients(){
  const now=new Date();
  const dayOfWeek=now.getDay()===0?6:now.getDay()-1;
  const weekStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dayOfWeek);
  const weekEnd=new Date(weekStart.getTime()+7*24*60*60*1000);
  const clientIds=new Set(D.interventions.filter(i=>{
    if(!i.date) return false;
    const d=new Date(i.date);
    return d>=weekStart&&d<weekEnd;
  }).map(i=>i.client_name));
  return D.clients.filter(c=>clientIds.has(c.name));
}
function getMonthClients(){
  const now=new Date();
  const prefix=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const clientIds=new Set(D.interventions.filter(i=>i.date&&i.date.startsWith(prefix)).map(i=>i.client_name));
  return D.clients.filter(c=>clientIds.has(c.name));
}

function pagePrestationsHist(){
  const now = new Date();
  const view = S.prestView || 'semaine';
  // Semaine courante : lundi au dimanche
  const dayOfWeek = now.getDay()===0?6:now.getDay()-1; // 0=lundi
  const weekStart = new Date(now.getFullYear(),now.getMonth(),now.getDate()-dayOfWeek);
  const weekEnd = new Date(weekStart.getTime()+7*24*60*60*1000);
  const monthPrefix = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');

  let items = D.interventions.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(view==='semaine') items = items.filter(i=>{
    if(!i.date) return false;
    const d = new Date(i.date);
    return d>=weekStart && d<weekEnd;
  });
  else if(view==='mois') items = items.filter(i=>i.date&&i.date.startsWith(monthPrefix));

  // Filtre statut paiement
  const prestStatut = S.prestStatut||'tous';
  if(prestStatut==='paye') items = items.filter(i=>i.statut_paiement==='paye');

  // CA en attente

  const caPaye = items.filter(i=>i.statut_paiement==='paye').reduce((s,i)=>s+(i.montant||0),0);

async function saveIntervention(){
  const montant = parseFloat(S.form.montant)||0;
  if(!montant){ alert('Montant requis.'); return; }
  if(!S.form.moyen_paiement){ alert('Moyen de règlement requis.'); return; }

  // EDIT mode
  if(S.form.editIntervId){
    const old = D.interventions.find(i=>i.id===S.form.editIntervId||i.id==S.form.editIntervId);
    if(!old) return;
    const diff = montant - (old.montant||0);
    const updates = {
      date: S.form.date||old.date,
      vehicle: S.form.vehicle||'',
      prestation: S.form.prestation==='Autre'?(S.form.prestationLibre||'Autre'):S.form.prestation||old.prestation,
      montant,
      moyen_paiement: S.form.moyen_paiement
    };
    const{error}=await sb.from('interventions').update(updates).eq('id',S.form.editIntervId);
    if(error){alert('Erreur: '+error.message);return;}
    Object.assign(old, updates);
    // Update client CA if amount changed
    if(diff!==0){
      const c = D.clients.find(x=>x.name===old.client_name);
      if(c){
        const newCA = Math.max(0,(c.ca||0)+diff);
        await sb.from('clients').update({ca:newCA}).eq('id',c.id);
        c.ca = newCA;
      }
    }
    closeModal();render();
    return;
  }

  let clientId = S.form.clientId;
  let clientName = '';

  if(S.form.newClient || S.form.clientId==='nouveau'){
    if(!S.form.newClientName?.trim()){ alert('Nom du client requis.'); return; }
    // Create new client
    const{data,error}=await sb.from('clients').insert({
      user_id:currentUser.id,
      name:S.form.newClientName.trim(),
      phone:S.form.newClientPhone||'',
      ca:0, status:'new', type_client:'particulier'
    }).select().single();
    if(error){alert('Erreur création client: '+error.message);return;}
    if(data){ D.clients.push(data); clientId=data.id; clientName=data.name; }
  } else {
    const c = D.clients.find(x=>x.id==clientId||x.id===clientId);
    clientName = c?.name||'';
  }

  const prestation = S.form.prestation==='Autre'?(S.form.prestationLibre||'Autre'):S.form.prestation||'';
  const row={
    user_id:currentUser.id,
    client_id:clientId,
    client_name:clientName,
    date:S.form.date||new Date().toISOString().slice(0,10),
    vehicle:S.form.vehicle||'',
    prestation,
    montant,
    moyen_paiement:S.form.moyen_paiement
  };
  const{data,error}=await sb.from('interventions').insert(row).select().single();
  if(error){alert('Erreur: '+error.message);return;}
  if(data) D.interventions.push(data);

  // Update client CA
  const{error:e2}=await sb.from('clients').update({ca:montant}).eq('id',clientId);
  // Increment CA (use rpc or fetch current)
  const c = D.clients.find(x=>x.id==clientId||x.id===clientId);
  if(c){
    const newCA = (c.ca||0)+montant;
    await sb.from('clients').update({ca:newCA}).eq('id',clientId);
    c.ca = newCA;
  }

  closeModal();render();
}

function editIntervention(id){
  const i = D.interventions.find(x=>x.id===id||x.id==id);
  if(!i) return;
  S.form = {
    editIntervId: id,
    clientId: i.client_id,
    newClient: false,
    date: i.date||'',
    vehicle: i.vehicle||'',
    prestation: i.prestation||'',
    montant: i.montant||0,
    moyen_paiement: i.moyen_paiement||''
  };
  // Set client name for display
  S.form._clientName = i.client_name;
  $('modal-content').innerHTML = mIntervention();
  $('modal-overlay').classList.add('open');
}

async function togglePaiement(id, newStatut){
  const i = D.interventions.find(x=>x.id===id||x.id==id);
  if(!i) return;
  const{error}=await sb.from('interventions').update({statut_paiement:newStatut}).eq('id',id);
  if(error){alert('Erreur: '+error.message);return;}
  i.statut_paiement = newStatut;
  render();
}

async function delIntervention(id){
  if(!confirm('Supprimer cette prestation ?')) return;
  // Also subtract from client CA
  const interv = D.interventions.find(i=>i.id===id||i.id==id);
  if(interv){
    const c = D.clients.find(x=>x.name===interv.client_name);
    if(c){
      const newCA = Math.max(0,(c.ca||0)-(interv.montant||0));
      await sb.from('clients').update({ca:newCA}).eq('id',c.id);
      c.ca = newCA;
    }
    await sb.from('interventions').delete().eq('id',id);
    D.interventions = D.interventions.filter(i=>i.id!==id&&i.id!=id);
  }
  render();
}

function getClientsForMonth(year, month){
  // Clients ayant eu une intervention ce mois
  const prefix = year+'-'+String(month+1).padStart(2,'0');
  const names = new Set(D.interventions.filter(i=>i.date&&i.date.startsWith(prefix)).map(i=>i.client_name));
  return D.clients.filter(c=>names.has(c.name));
}
function getDepensesForMonth(year, month){
  const prefix = year+'-'+String(month+1).padStart(2,'0');
  const manuelle = D.depenses.filter(d=>d.date&&d.date.startsWith(prefix));
  const fb = D.kpis.filter(k=>k.dates&&k.dates.startsWith&&k.dates.startsWith(prefix)).map(k=>({montant:k.depenses||0,fournisseur:'Meta Ads',categorie:'Publicité',description:'Campagne '+k.semaine}));
  return [...manuelle, ...fb];
}

    const ans=qs.ans[qi];

    q.opts.forEach((opt,oi)=>{
      let cls='';

      else if(oi===ans)cls=' selected';
      quizH+=`<div class="quiz-option${cls}" onclick="${qs.sub?'':`selAns(${id},${qi},${oi})`}"><div class="quiz-radio${oi===ans?' on':''}"></div>${opt}</div>`;

  else{const score=m.quiz.filter((q,qi)=>qs.ans[qi]===q.ok).length;const pct=Math.round(score/m.quiz.length*100);quizH+=`<div class="quiz-result ${pct>=70?'good':'bad'}">${pct>=70?'Bravo !':'À retravailler'} — ${score}/${m.quiz.length} bonne${score>1?'s':''} réponse${score>1?'s':''} (${pct}%)</div><button class="btn" style="width:100%;margin-top:10px" onclick="rstQuiz(${id})">Recommencer</button>`;}

    <div style="display:flex;align-items:center;gap:10px;margin-top:12px"><div style="flex:1;height:6px;background:var(--bg-tertiary);border-radius:3px"><div style="height:100%;width:${m.progress}%;background:var(--blue);border-radius:3px"></div></div><span style="font-size:12px;color:var(--text-secondary)">${m.progress}%</span>${badge}</div>
  </div>
  <div class="mod-tabs">${tabs.map(t=>`<div class="mod-tab${tab===t.id?' active':''}" onclick="setTab('${t.id}')">${t.l}</div>`).join('')}</div>
  ${content[tab]||''}`;

function pageDepenses(){
  const now = new Date();
  const curM = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const allDep = [...D.depenses];
  // Auto-add FB Ads spend from KPIs
  D.kpis.forEach(k=>{
    if((k.depenses||0)>0){
      const fbKey = 'fb_kpi_'+k.id;
      if(!allDep.find(d=>d._fbKey===fbKey)){
        allDep.push({id:fbKey,_fbKey:fbKey,date:k.dates||'',fournisseur:'Meta Ads (Facebook)',categorie:'Publicité',description:'Campagne '+k.semaine,montant:k.depenses,moyen:'Carte bancaire',_auto:true});
      }
    }
  });
  const total=allDep.reduce((s,d)=>s+(d.montant||0),0);
  const monthDep=allDep.filter(d=>d.date&&d.date.startsWith(curM));
  const totalMonth=monthDep.reduce((s,d)=>s+(d.montant||0),0);
  const parCat={};allDep.forEach(d=>{parCat[d.categorie]=(parCat[d.categorie]||0)+(d.montant||0)});
  const top=Object.entries(parCat).sort((a,b)=>b[1]-a[1])[0];
  const fbTotal=allDep.filter(d=>d.categorie==='Publicité').reduce((s,d)=>s+(d.montant||0),0);

  return`<div class="topbar"><div class="page-title">Dépenses entreprise</div><button class="btn primary" onclick="openModal('depense')">+ Ajouter une dépense</button></div>
  <div class="stats-grid cols4">
    <div class="stat-card"><div class="stat-label">Total toutes dépenses</div><div class="stat-value">${total.toFixed(0)}€</div></div>
    <div class="stat-card"><div class="stat-label">Dépenses ce mois</div><div class="stat-value">${totalMonth.toFixed(0)}€</div><div class="stat-sub">${now.toLocaleString('fr-FR',{month:'long'})}</div></div>
    <div class="stat-card"><div class="stat-label">Budget Facebook Ads</div><div class="stat-value" style="color:var(--blue)">${fbTotal.toFixed(0)}€</div><div class="stat-sub">Auto-importé des KPI</div></div>
    <div class="stat-card"><div class="stat-label">Principale catégorie</div><div class="stat-value" style="font-size:14px">${top?top[0]:'—'}</div>${top?`<div class="stat-sub">${top[1].toFixed(0)}€</div>`:''}</div>
  </div>
  <div class="card"><div class="card-head"><span class="card-title">Toutes les dépenses</span><span style="font-size:11px;color:var(--blue)">✨ Dépenses Facebook Ads auto-importées des KPI</span></div>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Date</th><th>Fournisseur / Prestataire</th><th>Catégorie</th><th>Description</th><th class="td-right">Montant TTC</th><th>Moyen de paiement</th><th></th></tr></thead>
    <tbody>${allDep.length===0?`<tr><td colspan="7" class="empty">Aucune dépense — ajoute ta première !</td></tr>`:allDep.map(d=>`<tr style="${d._auto?'background:var(--blue-light);':''}"><td style="color:var(--text-secondary)">${d.date||'—'}</td><td><strong>${d.fournisseur}</strong>${d._auto?'<span style="font-size:10px;color:var(--blue);margin-left:6px">auto</span>':''}</td><td><span class="pill pill-amber">${d.categorie}</span></td><td style="color:var(--text-secondary)">${d.description||''}</td><td class="td-right" style="color:var(--red-mid);font-weight:600">${(d.montant||0).toFixed(2)}€</td><td style="color:var(--text-secondary)">${d.moyen||'—'}</td><td>${d._auto?'':'<span class=\"del-btn\" onclick=\"delDep(\''+d.id+'\')\">×</span>'}</td></tr>`).join('')}</tbody>
  </table></div></div>`;
}

function pageKpiFb(){
  const rows=D.kpis,last=rows[rows.length-1];
  const now = new Date();
  const curMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  // Monthly rows = rows whose dates contain current month
  const monthRows = rows.filter(r=>r.dates&&(r.dates.includes(String(now.getMonth()+1))||r.semaine&&r.semaine.includes(String(now.getMonth()+1))));
  const totalClients = rows.reduce((s,r)=>s+(r.clients_ob||0),0);
  const monthClients = monthRows.reduce((s,r)=>s+(r.clients_ob||0),0);
  const totalLeads = rows.reduce((s,r)=>s+(r.leads||0),0);
  const totalDepFB = rows.reduce((s,r)=>s+(r.depenses||0),0);
  const totalRev = rows.reduce((s,r)=>s+(r.revenus||0),0);
  let sumH='';
  if(last){const cpl=last.leads>0?last.depenses/last.leads:0;const roas=last.depenses>0?last.revenus/last.depenses:0;const ctr=last.impressions>0?last.clics/last.impressions*100:0;
    sumH=`<div class="stats-grid cols4">
      <div class="stat-card"><div class="stat-label">Clients obtenus (total)</div><div class="stat-value">${totalClients}</div><div class="stat-sub">dont ${monthClients} ce mois</div></div>
      <div class="stat-card"><div class="stat-label">Leads totaux</div><div class="stat-value">${totalLeads}</div><div class="stat-sub">Tx conv. ${totalLeads>0?f1(totalClients/totalLeads*100):0}%</div></div>
      <div class="stat-card"><div class="stat-label">Dépenses FB totales</div><div class="stat-value">${totalDepFB}€</div><div class="stat-sub">ROAS global ${totalDepFB>0?f2(totalRev/totalDepFB):0}x</div></div>
      <div class="stat-card"><div class="stat-label">CPL dernière sem.</div><div class="stat-value">${f2(cpl)}€</div><div class="stat-sub">CTR ${f2(ctr)}%</div></div>
    </div>`;}
  const tbody=rows.map((r,i)=>{const p=rows[i-1]||null;
    const cpl=r.leads>0?r.depenses/r.leads:0,pCpl=p&&p.leads>0?p.depenses/p.leads:null;
    const cac=r.clients_ob>0?r.depenses/r.clients_ob:0,pCac=p&&p.clients_ob>0?p.depenses/p.clients_ob:null;
    const roas=r.depenses>0?r.revenus/r.depenses:0,pRoas=p&&p.depenses>0?p.revenus/p.depenses:null;
    const ctr=r.impressions>0?r.clics/r.impressions*100:0;
    const txC=r.leads>0?r.clients_ob/r.leads*100:0;
    return`<tr><td><strong>${r.semaine}</strong></td><td style="color:var(--text-secondary)">${r.dates||''}</td><td class="td-num">${fmtN(r.impressions)}</td><td class="td-num">${r.clics}</td><td class="td-num">${r.leads}</td><td class="td-num">${r.clients_ob}</td><td class="td-num">${f1(txC)}%</td><td class="td-num" style="color:var(--red-mid);font-weight:500">${r.depenses}€</td><td class="td-num">${f2(cpl)}€</td><td class="td-num">${evo(cpl,pCpl,true)}</td><td class="td-num">${f2(ctr)}%</td><td class="td-num">${f1(txC)}%</td><td class="td-num">${f2(cac)}€</td><td class="td-num">${evo(cac,pCac,true)}</td><td class="td-num" style="color:var(--green-mid);font-weight:500">${r.revenus}€</td><td class="td-num">${r.panier}€</td><td class="td-num"><strong>${f2(roas)}x</strong></td><td class="td-num">${evo(roas,pRoas,false)}</td><td><span class="del-btn" onclick="delKpi('${r.id}')">×</span></td></tr>`;
  }).join('');
  return`<div class="topbar"><div class="page-title">KPI Facebook Ads</div><button class="btn primary" onclick="openModal('kpi')">+ Nouvelle semaine</button></div>
  ${sumH}<div class="card"><div class="card-head"><span class="card-title">Suivi hebdomadaire</span><span style="font-size:11px;color:var(--text-secondary)">Métriques calculées automatiquement</span></div>
  <div class="tbl-wrap"><table><thead><tr><th>Semaine</th><th>Dates</th><th class="td-num">Impressions</th><th class="td-num">Clics</th><th class="td-num">Leads</th><th class="td-num">Clients</th><th class="td-num">Conv.(%)</th><th class="td-num">Dépenses(€)</th><th class="td-num">CPL(€)</th><th class="td-num">Évo.CPL</th><th class="td-num">CTR(%)</th><th class="td-num">Tx conv.(%)</th><th class="td-num">CAC(€)</th><th class="td-num">Évo.CAC</th><th class="td-num">Revenus(€)</th><th class="td-num">Panier</th><th class="td-num">ROAS</th><th class="td-num">Évo.ROAS</th><th></th></tr></thead>
  <tbody>${rows.length===0?`<tr><td colspan="19" class="empty">Ajoute ta première semaine</td></tr>`:tbody}</tbody></table></div></div>`;
}

async function syncQuiz(mId){
  const qs=D.quizState[mId];
  const existing=qs.dbId;
  if(existing){
    await sb.from('quiz_state').update({answers:qs.ans,submitted:qs.sub}).eq('id',existing);
  } else {
    const{data}=await sb.from('quiz_state').insert({user_id:currentUser.id,module_id:mId,answers:qs.ans,submitted:qs.sub}).select().single();
    if(data) D.quizState[mId].dbId=data.id;
  }
}

function exportToGoogleCalendar(ev){
  const date = new Date(ev.year, ev.month, ev.day);
  const pad = n => String(n).padStart(2,'0');
  const [h,m] = (ev.time||'09:00').split(':');
  const start = `${ev.year}${pad(ev.month+1)}${pad(ev.day)}T${pad(h)}${pad(m)}00`;
  const endH = parseInt(h)+1;
  const end = `${ev.year}${pad(ev.month+1)}${pad(ev.day)}T${pad(endH)}${pad(m)}00`;
  const title = encodeURIComponent(`${ev.name} — ${EV_LABELS[ev.type]||ev.type}`);
  const details = encodeURIComponent(ev.vehicle ? `Véhicule : ${ev.vehicle}` : '');
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
  window.open(url, '_blank');
}

function printDoc(id){
  const doc = D.factures.find(f=>f.id===id);

  S.previewDocId=id;
  render();
  setTimeout(()=>{
    const el = document.getElementById('doc-preview');

    const w = window.open('','_blank');
    w.document.write('<html><head><title>'+doc.numero+'</title><style>body{font-family:-apple-system,sans-serif;margin:0;padding:20px}@media print{body{margin:0}}</style></head><body>');

// ═══════════════════════════════════
// MODAL NOUVEAU DOCUMENT
// ═══════════════════════════════════
function mNewDoc(){
  const type = S.form.docType||'facture';
  const lignes = S.form.lignes||[{nom:'',description:'',quantite:1,prix:0}];
  const totalHT = lignes.reduce((s,l)=>s+(parseFloat(l.quantite||1)*parseFloat(l.prix||0)),0);
  const tva = parseFloat(S.form.tva||0);
  const totalTTC = totalHT*(1+tva/100);

  return`<div class="modal-title">Nouveau ${type==='devis'?'devis':'facture'}</div>
  <div class="form-grid2">
    <div class="field"><label>Type</label>
      <select onchange="S.form.docType=this.value;$('modal-content').innerHTML=mNewDoc()">
        <option value="facture"${type==='facture'?' selected':''}>Facture</option>
        <option value="devis"${type==='devis'?' selected':''}>Devis</option>
      </select>
    </div>
    <div class="field"><label>Date</label><input type="date" value="${S.form.date||new Date().toISOString().slice(0,10)}" oninput="S.form.date=this.value"></div>
  </div>
  <div class="field"><label>Client *</label>
    <select onchange="prefillClient(this.value)">
      <option value="">-- Sélectionner un client --</option>
      ${D.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      <option value="nouveau">+ Saisir manuellement</option>
    </select>
  </div>
  <div id="client-fields">
    <div class="form-grid2">
      <div class="field"><label>Nom client</label><input id="f-client" value="${S.form.client||''}" oninput="S.form.client=this.value" placeholder="ex: Marie Dupont"></div>
      <div class="field"><label>Téléphone</label><input value="${S.form.clientTel||''}" oninput="S.form.clientTel=this.value" placeholder="06 12 34 56 78"></div>
    </div>
    <div class="field"><label>Adresse client</label><input value="${S.form.clientAdresse||''}" oninput="S.form.clientAdresse=this.value" placeholder="12 rue des Lilas, Rouen"></div>
  </div>

  <div style="margin:1rem 0 0.5rem;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em">Prestations</div>
  <div id="lignes-container">
    ${lignes.map((l,i)=>`<div style="margin-bottom:8px;padding:8px;background:var(--bg-secondary);border-radius:var(--radius-md)">
      <div style="display:grid;grid-template-columns:2fr 0.6fr 1fr auto;gap:6px;margin-bottom:4px;align-items:center">
        <select onchange="selectPrestation(${i},this.value)" style="padding:7px 8px;font-size:12px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary)">
          <option value="">Choisir une prestation...</option>
          ${D.prestations.map(p=>`<option value="${p.id}"${l.nom===p.nom?' selected':''}>${p.nom} — ${p.prix}€</option>`).join('')}
          <option value="libre">✏️ Saisie libre</option>
        </select>
        <input type="number" value="${l.quantite||1}" min="1" placeholder="Qté" oninput="S.form.lignes[${i}].quantite=this.value;updateDocTotal()" style="padding:7px 8px;font-size:12px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);text-align:center">
        <input type="number" value="${l.prix||0}" placeholder="Prix HT €" oninput="S.form.lignes[${i}].prix=this.value;updateDocTotal()" style="padding:7px 8px;font-size:12px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md)">
        <span class="del-btn" onclick="removeLigne(${i})">×</span>
      </div>
      <input value="${l.nom||''}" placeholder="Intitulé de la prestation (modifiable)" oninput="S.form.lignes[${i}].nom=this.value" style="width:100%;padding:6px 8px;font-size:12px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md);margin-bottom:4px">
      <input value="${l.description||''}" placeholder="Description (optionnel)" oninput="S.form.lignes[${i}].description=this.value" style="width:100%;padding:6px 8px;font-size:12px;border:0.5px solid var(--gray-border-mid);border-radius:var(--radius-md)">
    </div>`).join('')}
  </div>
  <button class="btn sm" style="margin-bottom:1rem" onclick="addLigne()">+ Ligne</button>

  <div class="form-grid2">
    <div class="field"><label>TVA (%)</label>
      <select onchange="S.form.tva=this.value;updateDocTotal()">
        <option value="0"${tva===0?' selected':''}>Sans TVA (auto-entrepreneur)</option>
        <option value="20"${tva===20?' selected':''}>20%</option>
        <option value="10"${tva===10?' selected':''}>10%</option>
        <option value="5.5"${tva===5.5?' selected':''}>5.5%</option>
      </select>
    </div>
    <div class="field"><label>Total TTC</label>
      <div id="total-ttc" style="padding:8px 10px;font-size:16px;font-weight:600;color:var(--blue)">${totalTTC.toFixed(2)}€</div>
    </div>
  </div>
  <div class="field"><label>Notes / Conditions</label><textarea oninput="S.form.notes=this.value" placeholder="Conditions de paiement, remarques...">${S.form.notes||''}</textarea></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn-save" onclick="saveDoc()">Créer le document</button></div>`;
}

function mPrestation(){
  const isEdit = !!S.form.editPrestId;
  return`<div class="modal-title">${isEdit?'Modifier la prestation':'Nouvelle prestation'}</div>
  <div class="field"><label>Nom de la prestation *</label><input value="${S.form.nom||''}" oninput="S.form.nom=this.value" placeholder="ex: Nettoyage complet premium"></div>
  <div class="field"><label>Description</label><input value="${S.form.description||''}" oninput="S.form.description=this.value" placeholder="Détail de la prestation"></div>
  <div class="field"><label>Prix HT (€) *</label><input type="number" value="${S.form.prix||''}" oninput="S.form.prix=this.value" placeholder="ex: 150"></div>
  <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn-save" onclick="savePrestation()">${isEdit?'Modifier':'Ajouter'}</button></div>`;
}

function prefillClient(clientId){
  if(!clientId||clientId==='nouveau') return;
  const c = D.clients.find(c=>c.id==clientId);
  if(!c) return;
  S.form.client = c.name;
  S.form.clientTel = c.phone||'';
  S.form.clientAdresse = '';
  document.getElementById('f-client') && (document.getElementById('f-client').value=c.name);
}

function selectPrestation(idx, prestId){
  if(!prestId||prestId==='libre') return;
  const p = D.prestations.find(p=>p.id==prestId);
  if(!p) return;
  S.form.lignes[idx].nom = p.nom;
  S.form.lignes[idx].description = p.description;
  S.form.lignes[idx].prix = p.prix;
  document.getElementById('modal-content').innerHTML = mNewDoc();
}

function addLigne(){
  if(!S.form.lignes) S.form.lignes=[];
  S.form.lignes.push({nom:'',description:'',quantite:1,prix:0});
  document.getElementById('modal-content').innerHTML = mNewDoc();
}

function removeLigne(idx){
  S.form.lignes.splice(idx,1);
  if(S.form.lignes.length===0) S.form.lignes=[{nom:'',description:'',quantite:1,prix:0}];
  document.getElementById('modal-content').innerHTML = mNewDoc();
}

function updateDocTotal(){
  const lignes = S.form.lignes||[];
  const totalHT = lignes.reduce((s,l)=>s+(parseFloat(l.quantite||1)*parseFloat(l.prix||0)),0);
  const tva = parseFloat(S.form.tva||0);
  const totalTTC = totalHT*(1+tva/100);
  const el = document.getElementById('total-ttc');
  if(el) el.textContent = totalTTC.toFixed(2)+'€';
}

function saveDoc(){
  const lignes = S.form.lignes||[];
  const clientName = S.form.client||(document.getElementById('f-client')?.value||'');
  if(!clientName.trim()){ alert('Nom du client requis.'); return; }
  if(lignes.filter(l=>l.nom||l.prix>0).length===0){ alert('Ajoute au moins une prestation.'); return; }
  const type = S.form.docType||'facture';

  // If editing existing doc
  if(S.form.editDocId){
    const idx = D.factures.findIndex(f=>f.id===S.form.editDocId);
    if(idx>=0){
      const totalHT2 = lignes.reduce((s,l)=>s+Math.round(parseFloat(l.quantite||1)*parseFloat(l.prix||0)*100)/100,0);
      const tva2 = parseFloat(S.form.tva||0);
      D.factures[idx]={...D.factures[idx],client:clientName.trim(),clientAdresse:S.form.clientAdresse||'',clientTel:S.form.clientTel||'',date:S.form.date||D.factures[idx].date,lignes:lignes.filter(l=>l.nom||l.prix>0).map(l=>({...l,quantite:parseFloat(l.quantite)||1,prix:parseFloat(l.prix)||0})),tva:tva2,totalHT:totalHT2,totalTTC:Math.round(totalHT2*(1+tva2/100)*100)/100,notes:S.form.notes||''};
    }
    try{localStorage.setItem('ecolia_factures_'+currentUser.id,JSON.stringify(D.factures));}catch(e){}
    closeModal(); S.previewDocId=S.form.editDocId; render(); return;
  }

  const prefix = type==='devis'?'DE':'FA';
  const numero = prefix+'-'+new Date().getFullYear()+'-'+String(D.nextFactureNum++).padStart(3,'0');
  const totalHT = lignes.reduce((s,l)=>s+Math.round(parseFloat(l.quantite||1)*parseFloat(l.prix||0)*100)/100,0);
  const tva = parseFloat(S.form.tva||0);
  const totalTTC = Math.round(totalHT*(1+tva/100)*100)/100;
  const newDoc = {
    id: Date.now(),
    type, numero,
    client: clientName.trim(),
    clientAdresse: S.form.clientAdresse||'',
    clientTel: S.form.clientTel||'',
    clientEmail: '',
    date: S.form.date||new Date().toISOString().slice(0,10),
    dateEcheance: '',
    lignes: lignes.filter(l=>l.nom||l.prix>0).map(l=>({...l,quantite:parseFloat(l.quantite)||1,prix:parseFloat(l.prix)||0})),
    tva, totalHT, totalTTC,
    statut: type==='devis'?'devis':'attente',
    notes: S.form.notes||''
  };
  D.factures.push(newDoc);
  try{ localStorage.setItem('ecolia_factures_'+currentUser.id, JSON.stringify(D.factures)); }catch(e){}
  closeModal();
  S.previewDocId = newDoc.id;
  render();
}

function savePrestation(){
  if(!S.form.nom?.trim()){ alert('Nom requis.'); return; }
  if(S.form.editPrestId){
    const idx = D.prestations.findIndex(p=>p.id===S.form.editPrestId);
    if(idx>=0) D.prestations[idx]={...D.prestations[idx],nom:S.form.nom.trim(),description:S.form.description||'',prix:parseFloat(S.form.prix)||0};
  } else {
    const newId = Math.max(0,...D.prestations.map(p=>p.id))+1;
    D.prestations.push({id:newId, nom:S.form.nom.trim(), description:S.form.description||'', prix:parseFloat(S.form.prix)||0});
  }
  closeModal(); render();
}

function editPrestation(id){
  const p = D.prestations.find(x=>x.id===id||x.id==id);
  if(!p) return;
  S.form = {editPrestId:p.id, nom:p.nom, description:p.description||'', prix:p.prix||0};
  $('modal-content').innerHTML = mPrestation();
  $('modal-overlay').classList.add('open');
}

function loadFactures(){
  try{
    const saved = localStorage.getItem('ecolia_factures_'+currentUser.id);
    if(saved) D.factures = JSON.parse(saved);
    const num = localStorage.getItem('ecolia_facturenum_'+currentUser.id);
    if(num) D.nextFactureNum = parseInt(num);
  }catch(e){}
}

function nav(p){
  S.page=p;S.openModuleId=null;closeSidebar();
  ['dashboard','crm','formation'].forEach(id=>{const el=$('mn-'+id);if(el)el.classList.toggle('active',id===p||(id==='formation'&&['formation'].includes(p)))});
  render();
}

async function logout(){
  await sb.auth.signOut();
  currentUser=null;currentProfile=null;D={events:[],clients:[],depenses:[],kpis:[],quizState:{},factures:[],prestations:[{id:1,nom:'Nettoyage intérieur',prix:80,description:''},{id:2,nom:'Nettoyage extérieur',prix:60,description:''},{id:3,nom:'Nettoyage complet',prix:130,description:''},{id:4,nom:'Protection céramique',prix:250,description:''},{id:5,nom:'Polish / Correction',prix:180,description:''}],profil:{siret:'',nom_entreprise:'',adresse:'',telephone:'',email_pro:'',logo:null,couleur:'#185FA5',iban:''},nextFactureNum:1};
  const mn=$('mobile-nav');if(mn)mn.style.display='none';
  renderLogin();
}

function openSidebar(){const sb2=$('sidebar'),ov=$('sidebar-overlay');if(sb2)sb2.classList.add('open');if(ov)ov.classList.add('show')}
function closeSidebar(){const sb2=$('sidebar'),ov=$('sidebar-overlay');if(sb2)sb2.classList.remove('open');if(ov)ov.classList.remove('show')}
function calPrev(){if(S.cal.month===0){S.cal.month=11;S.cal.year--;}else S.cal.month--;render()}
function calNext(){if(S.cal.month===11){S.cal.month=0;S.cal.year++;}else S.cal.month++;render()}
function calDay(d){S.cal.sel={d,m:S.cal.month,y:S.cal.year};render()}
function openMod(id){S.openModuleId=id;S.activeTab='videos';render()}
function closeMod(){S.openModuleId=null;render()}
function setTab(t){S.activeTab=t;render()}

function renderPage(){
  const pages={dashboard:pageDashboard,crm:pageCRM,prestations_hist:pagePrestationsHist,compta:pageCompta,formation:pageFormation,depenses:pageDepenses,kpifb:pageKpiFb,factures:S.previewDocId?()=>pageFacturePreview(S.previewDocId):pageFactures,profil:pageProfil};
  $('main').innerHTML=(pages[S.page]||pageDashboard)();
}
function render(){
  $('sidebar').innerHTML=renderSidebar();
  renderPage();
  ['dashboard','crm','formation'].forEach(id=>{const el=$('mn-'+id);if(el)el.classList.toggle('active',S.page===id||(id==='formation'&&['formation'].includes(S.page)))});
}

// ═══════════════════════════════════
// SERVICE WORKER (PWA)
// ═══════════════════════════════════
// PWA manifest injection
const manifestData = {
  name: "Ecolia Pro",
  short_name: "Ecolia Pro",
  description: "Espace formation nettoyage auto",
  start_url: "/",
  display: "standalone",
  background_color: "#F7F7F5",
  theme_color: "#185FA5",
  orientation: "portrait",
  icons: [
    {src:"https://placehold.co/192x192/185FA5/ffffff?text=E", sizes:"192x192", type:"image/png"},
    {src:"https://placehold.co/512x512/185FA5/ffffff?text=E", sizes:"512x512", type:"image/png"}
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestUrl = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement('link');
manifestLink.rel = 'manifest';
manifestLink.href = manifestUrl;
document.head.appendChild(manifestLink);

// Prompt installation sur Android
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner(){
  if(document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#185FA5;color:white;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.2);display:flex;align-items:center;gap:8px;font-family:-apple-system,sans-serif;white-space:nowrap';
  banner.textContent = 'Installer Ecolia Pro';
  banner.onclick = async () => {
    if(deferredPrompt){ deferredPrompt.prompt(); const r = await deferredPrompt.userChoice; deferredPrompt=null; }
    banner.remove();
  };
  document.body.appendChild(banner);
  setTimeout(()=>banner.remove(), 8000);
}

// ═══════════════════════════════════
// BOOT
// ═══════════════════════════════════
(async function boot(){
  showLoading('Initialisation...');
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    await loadProfileAndStart();
  } else {
    renderLogin();
  }
  // Écouter les changements de session
  sb.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){currentUser=null;currentProfile=null;renderLogin();}
  });
})();
</script>
